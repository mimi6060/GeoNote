name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: geonote_test
          POSTGRES_USER: geonote
          POSTGRES_PASSWORD: geonote
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgres://geonote:geonote@localhost:5432/geonote_test?sslmode=disable
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage
        working-directory: backend
        run: go tool cover -func=coverage.out

      - name: Build
        working-directory: backend
        run: go build -o /dev/null ./cmd/server
