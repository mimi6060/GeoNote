<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoNote - Admin Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body style="background:var(--gn-bg);">

  <header class="gn-topbar">
    <a href="/" class="gn-topbar-logo">GeoNote</a>
    <span style="font-size:0.9rem;color:var(--gn-text-muted);">Dashboard Admin</span>
    <a href="/map" class="gn-topbar-link">Carte</a>
  </header>

  <div class="gn-admin">
    <h1>Dashboard</h1>

    <nav class="gn-nav">
      <a href="/map">Carte</a>
      <a href="/profile">Profil</a>
      <a href="/admin" class="active">Admin</a>
    </nav>

    <!-- Stats -->
    <div class="gn-stats-grid" id="stats-grid">
      <div class="gn-stat-card">
        <div class="gn-stat-value" id="s-messages">-</div>
        <div class="gn-stat-label">Messages</div>
      </div>
      <div class="gn-stat-card">
        <div class="gn-stat-value" id="s-users">-</div>
        <div class="gn-stat-label">Utilisateurs</div>
      </div>
      <div class="gn-stat-card">
        <div class="gn-stat-value" id="s-interactions">-</div>
        <div class="gn-stat-label">Interactions</div>
      </div>
      <div class="gn-stat-card">
        <div class="gn-stat-value" id="s-beta">-</div>
        <div class="gn-stat-label">Inscrits beta</div>
      </div>
    </div>

    <!-- Messages recents -->
    <div class="gn-section">
      <h2>Messages recents</h2>
      <table class="gn-table">
        <thead>
          <tr><th>User</th><th>Message</th><th>Likes</th><th>Date</th></tr>
        </thead>
        <tbody id="recent-messages"></tbody>
      </table>
    </div>

    <!-- Top messages -->
    <div class="gn-section">
      <h2>Top messages (par likes)</h2>
      <table class="gn-table">
        <thead>
          <tr><th>User</th><th>Message</th><th>Likes</th><th>Comments</th></tr>
        </thead>
        <tbody id="top-messages"></tbody>
      </table>
    </div>

    <!-- Beta signups -->
    <div class="gn-section">
      <h2>Inscriptions beta</h2>
      <table class="gn-table">
        <thead>
          <tr><th>Email</th><th>Date</th></tr>
        </thead>
        <tbody id="beta-list"></tbody>
      </table>
    </div>

    <!-- Feedback -->
    <div class="gn-section">
      <h2>Laisser un feedback</h2>
      <form class="gn-feedback-form" onsubmit="sendFeedback(event)">
        <textarea id="feedback-text" placeholder="Bug, suggestion, idee..." required></textarea>
        <button type="submit">Envoyer</button>
      </form>
      <p id="feedback-msg" style="margin-top:8px;font-size:0.85rem;color:var(--gn-text-muted);"></p>
      <div id="feedback-list" style="margin-top:16px;"></div>
    </div>

    <!-- Export -->
    <div class="gn-section">
      <h2>Export</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button onclick="exportData('messages')" style="padding:10px 20px;border:1px solid var(--gn-border);border-radius:var(--gn-radius);background:white;cursor:pointer;">Export messages (JSON)</button>
        <button onclick="exportData('beta')" style="padding:10px 20px;border:1px solid var(--gn-border);border-radius:var(--gn-radius);background:white;cursor:pointer;">Export beta emails (JSON)</button>
        <button onclick="exportData('feedback')" style="padding:10px 20px;border:1px solid var(--gn-border);border-radius:var(--gn-radius);background:white;cursor:pointer;">Export feedbacks (JSON)</button>
      </div>
    </div>
  </div>

  <script>
    async function loadDashboard() {
      // Stats
      try {
        var r = await fetch('/api/admin/dashboard');
        var d = await r.json();
        document.getElementById('s-messages').textContent = d.stats.messages;
        document.getElementById('s-users').textContent = d.stats.users;
        document.getElementById('s-interactions').textContent = d.stats.interactions;
        document.getElementById('s-beta').textContent = d.stats.beta_signups;

        // Recent messages
        var tbody = document.getElementById('recent-messages');
        tbody.innerHTML = d.recent_messages.map(function(m) {
          return '<tr><td>@' + esc(m.username) + '</td><td>' + esc(m.content).substring(0, 60) + '</td><td>' + m.likes_count + '</td><td>' + fmtDate(m.created_at) + '</td></tr>';
        }).join('');

        // Top messages
        var top = document.getElementById('top-messages');
        top.innerHTML = d.top_messages.map(function(m) {
          return '<tr><td>@' + esc(m.username) + '</td><td>' + esc(m.content).substring(0, 60) + '</td><td>' + m.likes_count + '</td><td>' + m.comments_count + '</td></tr>';
        }).join('');

        // Beta
        var beta = document.getElementById('beta-list');
        beta.innerHTML = d.beta_signups.map(function(b) {
          return '<tr><td>' + esc(b.email) + '</td><td>' + fmtDate(b.created_at) + '</td></tr>';
        }).join('');
      } catch (err) {
        console.error('Erreur dashboard:', err);
      }

      // Feedbacks
      loadFeedbacks();
    }

    async function loadFeedbacks() {
      try {
        var r = await fetch('/api/feedback');
        var d = await r.json();
        var list = document.getElementById('feedback-list');
        if (!d.feedbacks || d.feedbacks.length === 0) {
          list.innerHTML = '<p style="color:var(--gn-text-muted);">Aucun feedback</p>';
          return;
        }
        list.innerHTML = d.feedbacks.map(function(f) {
          return '<div style="background:white;border:1px solid var(--gn-border);border-radius:var(--gn-radius);padding:12px;margin-bottom:8px;">'
            + '<p style="margin-bottom:4px;">' + esc(f.content) + '</p>'
            + '<span style="font-size:0.8rem;color:var(--gn-text-muted);">' + fmtDate(f.created_at) + '</span>'
            + '</div>';
        }).join('');
      } catch (err) {
        console.error('Erreur feedbacks:', err);
      }
    }

    async function sendFeedback(event) {
      event.preventDefault();
      var text = document.getElementById('feedback-text').value.trim();
      if (!text) return;
      try {
        var r = await fetch('/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: text }),
        });
        if (r.ok) {
          document.getElementById('feedback-text').value = '';
          document.getElementById('feedback-msg').textContent = 'Feedback envoye, merci !';
          loadFeedbacks();
        }
      } catch (err) {
        document.getElementById('feedback-msg').textContent = 'Erreur';
      }
    }

    async function exportData(type) {
      try {
        var r = await fetch('/api/admin/export/' + type);
        var d = await r.json();
        var blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'geonote-' + type + '.json';
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert('Erreur export');
      }
    }

    function esc(str) {
      if (!str) return '';
      var d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function fmtDate(s) {
      if (!s) return '';
      return new Date(s).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    loadDashboard();
  </script>

</body>
</html>
