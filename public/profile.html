<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoNote - Profil</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .profile-header {
      background: var(--gn-gradient);
      padding: 40px 20px;
      text-align: center;
      color: white;
    }
    .profile-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: bold;
      margin: 0 auto 12px;
      border: 3px solid white;
    }
    .profile-stats {
      display: flex; justify-content: center; gap: 40px; margin-top: 16px;
    }
    .profile-stat { text-align: center; }
    .profile-stat-value { font-size: 1.5rem; font-weight: bold; }
    .profile-stat-label { font-size: 0.8rem; opacity: 0.85; }
    .profile-content {
      max-width: 600px; margin: 0 auto; padding: 20px;
    }
    .profile-content h3 { margin-bottom: 16px; }
    .msg-card {
      background: white;
      border: 1px solid var(--gn-border);
      border-radius: var(--gn-radius);
      padding: 16px; margin-bottom: 12px;
    }
    .msg-card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .msg-card-location { color: var(--gn-text-muted); font-size: 0.8rem; }
    .msg-card-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 0.75rem; font-weight: bold;
    }
    .msg-card-badge.public { background: #e8f5e9; color: #2e7d32; }
    .msg-card-badge.friends { background: #e3f2fd; color: #1565c0; }
    .msg-card-badge.private { background: #f5f5f5; color: #757575; }
    .msg-card-text { margin: 8px 0; line-height: 1.4; }
    .msg-card-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 8px; font-size: 0.8rem; color: var(--gn-text-muted);
    }
    .msg-card-delete {
      background: none; border: none; color: #e53935; cursor: pointer;
      font-size: 0.85rem; padding: 4px 8px; border-radius: 4px;
    }
    .msg-card-delete:hover { background: #ffebee; }
    .empty-state {
      text-align: center; padding: 48px 20px; color: var(--gn-text-muted);
    }
    .empty-state p { margin: 12px 0; }
    .btn-back {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--gn-primary); color: white;
      border: none; padding: 12px 24px; border-radius: 24px;
      font-size: 0.95rem; cursor: pointer; text-decoration: none;
      box-shadow: 0 4px 12px rgba(255,107,53,0.3);
    }
    .user-select {
      display: flex; justify-content: center; gap: 8px; margin-top: 12px;
    }
    .user-select button {
      padding: 6px 14px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.5);
      background: transparent; color: white; cursor: pointer; font-size: 0.85rem;
      transition: background 0.2s;
    }
    .user-select button.active, .user-select button:hover {
      background: rgba(255,255,255,0.25); border-color: white;
    }
  </style>
</head>
<body>

  <div class="profile-header">
    <div class="profile-avatar" id="avatar">A</div>
    <h2 id="username">@alice_explore</h2>
    <div class="user-select" id="user-select"></div>
    <div class="profile-stats">
      <div class="profile-stat">
        <div class="profile-stat-value" id="msg-count">0</div>
        <div class="profile-stat-label">Messages</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-value" id="likes-count">0</div>
        <div class="profile-stat-label">Likes recus</div>
      </div>
    </div>
  </div>

  <div class="profile-content">
    <h3>Mes messages</h3>
    <div id="messages-list"></div>
  </div>

  <a href="/map" class="btn-back">Retour a la carte</a>

  <script>
    var users = [
      { id: 'a1111111-1111-1111-1111-111111111111', name: 'alice_explore' },
      { id: 'b2222222-2222-2222-2222-222222222222', name: 'bob_runner' },
      { id: 'c3333333-3333-3333-3333-333333333333', name: 'charlie_photo' },
      { id: 'd4444444-4444-4444-4444-444444444444', name: 'diana_local' },
      { id: 'e5555555-5555-5555-5555-555555555555', name: 'anon_user' },
    ];
    var currentUserId = users[0].id;

    function init() {
      var selectDiv = document.getElementById('user-select');
      users.forEach(function (u) {
        var btn = document.createElement('button');
        btn.textContent = '@' + u.name;
        btn.onclick = function () { switchUser(u.id, u.name); };
        if (u.id === currentUserId) btn.classList.add('active');
        selectDiv.appendChild(btn);
      });
      loadProfile(currentUserId, users[0].name);
    }

    function switchUser(userId, username) {
      currentUserId = userId;
      document.querySelectorAll('.user-select button').forEach(function (b, i) {
        b.classList.toggle('active', users[i].id === userId);
      });
      loadProfile(userId, username);
    }

    async function loadProfile(userId, username) {
      document.getElementById('username').textContent = '@' + username;
      document.getElementById('avatar').textContent = username[0].toUpperCase();

      try {
        var response = await fetch('/api/users/' + userId + '/messages');
        var data = await response.json();
        var messages = data.messages || [];

        document.getElementById('msg-count').textContent = messages.length;

        var totalLikes = 0;
        messages.forEach(function (m) { totalLikes += m.likes_count || 0; });
        document.getElementById('likes-count').textContent = totalLikes;

        renderMessages(messages, userId);
      } catch (err) {
        console.error('Erreur chargement profil:', err);
      }
    }

    function renderMessages(messages, userId) {
      var container = document.getElementById('messages-list');

      if (messages.length === 0) {
        container.innerHTML =
          '<div class="empty-state">'
          + '<div style="font-size:3rem;">&#128172;</div>'
          + '<p>Aucun message pour cet utilisateur</p>'
          + '<a href="/map" style="color:var(--gn-primary);">Laisser un message</a>'
          + '</div>';
        return;
      }

      container.innerHTML = messages.map(function (msg) {
        var time = formatRelativeTime(msg.created_at);
        return '<div class="msg-card">'
          + '<div class="msg-card-header">'
          +   '<span class="msg-card-location">&#128205; ' + msg.latitude.toFixed(4) + ', ' + msg.longitude.toFixed(4) + '</span>'
          +   '<span class="msg-card-badge ' + msg.visibility + '">' + msg.visibility + '</span>'
          + '</div>'
          + '<div class="msg-card-text">' + escapeHTML(msg.content) + '</div>'
          + '<div class="msg-card-footer">'
          +   '<span>' + (msg.likes_count || 0) + ' likes &middot; ' + (msg.comments_count || 0) + ' commentaires &middot; ' + time + '</span>'
          +   '<button class="msg-card-delete" onclick="deleteMessage(\'' + msg.id + '\', \'' + userId + '\')">Supprimer</button>'
          + '</div>'
          + '</div>';
      }).join('');
    }

    async function deleteMessage(messageId, userId) {
      if (!confirm('Supprimer ce message ?')) return;
      try {
        var response = await fetch('/api/messages/' + messageId, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId }),
        });
        if (response.ok) {
          var user = users.find(function (u) { return u.id === userId; });
          loadProfile(userId, user ? user.name : 'user');
        }
      } catch (err) {
        console.error('Erreur suppression:', err);
      }
    }

    function escapeHTML(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatRelativeTime(dateStr) {
      if (!dateStr) return '';
      var now = new Date();
      var date = new Date(dateStr);
      var diffMs = now - date;
      var diffMins = Math.floor(diffMs / 60000);
      var diffHours = Math.floor(diffMs / 3600000);
      var diffDays = Math.floor(diffMs / 86400000);
      if (diffMins < 1) return "a l'instant";
      if (diffMins < 60) return 'il y a ' + diffMins + 'min';
      if (diffHours < 24) return 'il y a ' + diffHours + 'h';
      if (diffDays < 7) return 'il y a ' + diffDays + 'j';
      return date.toLocaleDateString('fr-FR');
    }

    init();
  </script>

</body>
</html>
