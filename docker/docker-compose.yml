services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: geonote
      POSTGRES_USER: geonote
      POSTGRES_PASSWORD: ${DB_PASSWORD:-geonote}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geonote"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-3001}:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://geonote:${DB_PASSWORD:-geonote}@db:5432/geonote?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      CACHE_TTL: ${CACHE_TTL:-10s}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
