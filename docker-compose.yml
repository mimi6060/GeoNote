services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: geonote
      POSTGRES_USER: geonote
      POSTGRES_PASSWORD: geonote
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geonote"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "${GEONOTE_PORT:-3000}:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: geonote
      DB_USER: geonote
      DB_PASSWORD: geonote
      PORT: 3000
    volumes:
      - ./public:/app/public
      - ./server.js:/app/server.js
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
