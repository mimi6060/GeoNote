<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoNote - Laissez des messages partout</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <!-- GeoNote CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ====== TOP BAR ====== -->
  <header style="position:fixed;top:0;left:0;right:0;z-index:1000;background:#fff;padding:8px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.1);display:flex;justify-content:space-between;align-items:center;">
    <strong style="font-size:1.2rem;color:#333;">GeoNote</strong>
    <input id="search-hashtag" type="text" placeholder="Rechercher #hashtag..." style="width:250px;padding:8px 14px;border:1px solid #e0e0e0;border-radius:20px;font-size:0.9rem;outline:none;" />
    <a href="/profile" style="text-decoration:none;color:#666;font-size:0.9rem;">Mon profil</a>
  </header>

  <!-- ====== CARTE ====== -->
  <div id="map-container" style="width:100vw;height:100vh;"></div>

  <!-- ====== FILTRES ====== -->
  <div class="geonote-filters">
    <label for="filter-distance">Distance : <span id="radius-display">500m</span></label>
    <input type="range" id="filter-distance" min="100" max="5000" step="100" value="500" oninput="updateRadius(this.value)" />
    <select id="filter-sort" onchange="loadNearbyMessages()">
      <option value="distance">Proximite</option>
      <option value="recent">Plus recents</option>
      <option value="popular">Populaires</option>
    </select>
  </div>

  <!-- ====== BOUTON LOCALISATION ====== -->
  <button onclick="locateUser()" title="Ma position" style="position:fixed;bottom:24px;left:24px;width:48px;height:48px;background:#fff;border:none;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.15);cursor:pointer;z-index:1000;font-size:1.4rem;">
    +
  </button>

  <!-- ====== FAB AJOUTER MESSAGE ====== -->
  <button class="geonote-fab" onclick="openCreateMessage()" title="Laisser un message">
    +
  </button>

  <!-- ====== MODAL CREATION MESSAGE ====== -->
  <div id="create-message-modal" class="geonote-modal-overlay">
    <div class="geonote-modal">
      <h2>Laisser une note ici</h2>
      <form onsubmit="submitMessage(event)">
        <textarea name="content" placeholder="Votre message... (utilisez #hashtags)" maxlength="500" required></textarea>
        <div class="geonote-char-count"><span id="char-count">0</span>/500</div>

        <div style="margin-top:12px;">
          <label style="font-size:0.9rem;color:#666;">Visibilite</label>
          <div style="display:flex;gap:12px;margin-top:8px;">
            <label><input type="radio" name="visibility" value="public" checked /> Public</label>
            <label><input type="radio" name="visibility" value="friends" /> Amis</label>
            <label><input type="radio" name="visibility" value="private" /> Prive</label>
          </div>
        </div>

        <input type="hidden" id="msg-lat" name="latitude" />
        <input type="hidden" id="msg-lng" name="longitude" />

        <div style="display:flex;gap:8px;margin-top:16px;">
          <button type="button" onclick="closeCreateMessage()" style="flex:1;padding:14px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:1rem;">Annuler</button>
          <button type="submit" style="flex:2;padding:14px;border:none;border-radius:8px;background:#FF6B35;color:#fff;cursor:pointer;font-size:1rem;font-weight:bold;">Publier</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ====== SCRIPTS ====== -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="map.js"></script>

  <script>
    // Compteur de caracteres
    const textarea = document.querySelector('textarea[name="content"]');
    const charCount = document.getElementById('char-count');
    if (textarea && charCount) {
      textarea.addEventListener('input', () => {
        charCount.textContent = textarea.value.length;
      });
    }

    // Recherche hashtag
    const searchInput = document.getElementById('search-hashtag');
    if (searchInput) {
      let searchTimer;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          loadNearbyMessages();
        }, 300);
      });
    }
  </script>

</body>
</html>
